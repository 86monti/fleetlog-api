version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fleetlog_postgres
    restart: always
    environment:
      POSTGRES_USER: fleetlog_user
      POSTGRES_PASSWORD: fleetlog_password
      POSTGRES_DB: fleetlog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: fleetlog_api
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: